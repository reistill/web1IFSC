<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: grid;
            grid-template-areas: 
            "header header header header"
            "main   main     .    sidebar"
            "footer footer footer footer"
            ;
            /*define altura de cada linha do grid-template-areas*/
            grid-template-rows: 20vh 60vh 20vh;
        }

        .box{
            border-radius: 2%;
            border: 2px solid black;
        }

        #box1{background-color: rgb(255, 115, 0);
            grid-area: header;
        }
        #box2{background-color: rgb(0, 132, 255);
            grid-area: main;
        }
        #box3{background-color: rgb(255, 0, 0);
            grid-area: sidebar;
        }
        #box4{background-color: rgb(0, 255, 13);
        grid-area: footer;
        }
    </style>
</head>
<body>
    <!-- comando utilizado para criar todas as caixas -->
    <!-- div.container>div.box#box${box-$}*4 -->
    <div class="container">
        <div class="box" id="box1">box-1</div>
        <div class="box" id="box2">box-2</div>
        <div class="box" id="box3">box-3</div>
        <div class="box" id="box4">box-4</div>
    </div>
</body>
</html>
