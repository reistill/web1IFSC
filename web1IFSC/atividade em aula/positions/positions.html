<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        #container {
            border: 5px solid black;
            height: 100vh;
            width: 100vh;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #container>* {
            /*vai ser absoluto em referencia do elemento ancestral/pai mais próximo dele*/
            position: absolute;
            border: 3px solid black;
            width: 250px;
            height: 250px;
            text-align: center;
            background-color:chocolate;
        }

        #box2 {
            right: 0px;
            background-color: lightgreen;
        }

        #box3 {
            left: 0px;
            bottom: 0px;
            background-color: lightcoral;
        }

        #box4 {
            right: 0px;
            bottom: 0px;
            background-color: lightblue;
        }

        #box5 {
            top: 50%;
            left: 50%;
            height: 200px;
            width: 200px;
            border-radius: 50%;
            /*transform se baseia no top e left dado ali em cima*/
            transform: translate(-50%, -50%);
            line-height: 50%;
            background-color: beige;
        }

    </style>
</head>
<body>
    <div id="container">
        <div id="box1">box1</div>
        <div id="box2">box2</div>
        <div id="box3">box3</div>
        <div id="box4">box4</div>
        <div id="box5">box5</div>
    </div>
</body>
</html>
