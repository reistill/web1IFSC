<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Bloco de Notas</title>

    <style>

        body{
            font-family: Arial;
            background:#f2f2f2;
        }

        .container{

            width:700px;
            margin:30px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;

        }

        input{

            width:100%;
            padding:10px;
            margin-bottom:10px;

        }

        textarea{

            width:100%;
            height:180px;
            padding:10px;
            margin-bottom:10px;

        }

        button{

            padding:10px 20px;
            margin-right:10px;
            cursor:pointer;

        }

        ul{

            list-style:none;
            padding:0;

        }

        li{

            background:#eeeeee;
            margin:5px 0;
            padding:10px;
            cursor:pointer;

        }

        li:hover{

            background:#dcdcdc;

        }

    </style>

</head>

<body>
    <div class="container">

        <h1>Bloco de Notas</h1>

        <label>Título</label>

        <input type="text" id="titulo" placeholder="Título da nota">

        <label>Texto</label>

        <textarea id="texto" placeholder="Digite sua nota"></textarea>

        <br>

        <button id="salvar">Salvar</button>
        <button id="nova">Nova</button>
        <button id="excluir">Excluir</button>

        <hr>

        <h2>Notas Salvas</h2>

        <ul id="listaNotas"></ul>
    </div>

<script>
    const titulo = document.getElementById("titulo");
    const texto = document.getElementById("texto");
    const lista = document.getElementById("listaNotas");

    const btnSalvar = document.getElementById("salvar");
    const btnNova = document.getElementById("nova");
    const btnExcluir = document.getElementById("excluir");

    listarNotas();

    function salvarNota(){

        if(titulo.value.trim()==""){

            alert("Digite um título.");

            return;

        }

        let nota = {

            titulo: titulo.value,

            texto: texto.value

        };

        localStorage.setItem(

            titulo.value,

            JSON.stringify(nota)

        );

        listarNotas();

        alert("Nota salva!");

    }

    function listarNotas(){

        lista.innerHTML="";

        for(let i=0;i<localStorage.length;i++){

            let chave = localStorage.key(i);

            let item = document.createElement("li");

            item.textContent = chave;

            item.onclick = function(){

                abrirNota(chave);

            }

            lista.appendChild(item);

        }

    }

    function abrirNota(chave){

        let notaJSON = localStorage.getItem(chave);

        let nota = JSON.parse(notaJSON);

        titulo.value = nota.titulo;

        texto.value = nota.texto;

    }

    function novaNota(){

        titulo.value="";

        texto.value="";

    }

    function excluirNota(){

        if(titulo.value==""){

            alert("Selecione uma nota.");

            return;

        }

        if(confirm("Deseja excluir esta nota?")){

            localStorage.removeItem(titulo.value);

            novaNota();

            listarNotas();

        }

    }

    btnSalvar.addEventListener("click", salvarNota);

    btnNova.addEventListener("click", novaNota);

    btnExcluir.addEventListener("click", excluirNota);

</script>

</body>
</html>
